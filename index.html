<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Code Game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <button id="quitBtn" class="quit-floating">Quit</button>

  <main class="game">
    <h1>Color Code</h1>
    <p class="subtitle">Guess the hidden 5-color sequence.</p>

    <section class="current-guess">
      <div class="guess-title">
        <h2>Your Guess</h2>
        <button id="resetBtn" class="icon-btn" title="Reset Game">↻</button>
      </div>

      <div id="guessSlots" class="guess-slots"></div>
    </section>

    <section class="palette">
      <h2>Choose Colors</h2>
      <div id="colorPalette" class="color-palette"></div>
    </section>

    <div class="buttons">
  <button id="submitBtn">Submit Guess</button>
</div>

    <p id="message" class="message"></p>

    <section id="answerBox" class="answer-box hidden">
      <h2>The Answer Was</h2>
      <div id="answerColors" class="guess-slots"></div>
      <button id="replayBtn">Replay Game</button>
    </section>

    <section id="board" class="board"></section>

  </main>

  <script src="script.js"></script>
</body>
</html>
